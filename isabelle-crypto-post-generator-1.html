<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>@IsabelleGassen · Daily Crypto Post Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #e8c96a;
    --gold-dim: rgba(201,168,76,0.15);
    --bg: #0A0A0A;
    --bg2: #111111;
    --bg3: #181818;
    --text: #e8e0d0;
    --muted: #666;
    --border: rgba(201,168,76,0.2);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 20px 16px 40px;
    background-image: radial-gradient(ellipse at 80% 0%, rgba(201,168,76,0.06) 0%, transparent 60%);
  }

  header {
    text-align: center;
    margin-bottom: 28px;
    padding-top: 12px;
  }

  .logo-line {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--gold);
    opacity: 0.7;
    margin-bottom: 6px;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 2px;
    color: var(--gold);
    line-height: 1;
  }

  .subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    margin-top: 6px;
  }

  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 16px;
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--gold);
    opacity: 0.7;
    margin-bottom: 12px;
    text-transform: uppercase;
  }

  /* Topic pills */
  .topics-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 14px;
  }

  .topic-pill {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 12px;
    font-size: 11px;
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Mono', monospace;
    user-select: none;
  }

  .topic-pill:hover { border-color: var(--gold); color: var(--gold); }
  .topic-pill.active {
    background: var(--gold-dim);
    border-color: var(--gold);
    color: var(--gold-light);
  }

  /* Tone selector */
  .tone-row {
    display: flex;
    gap: 8px;
  }

  .tone-btn {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 4px;
    font-size: 10px;
    color: var(--muted);
    cursor: pointer;
    text-align: center;
    font-family: 'DM Mono', monospace;
    transition: all 0.2s;
    letter-spacing: 1px;
  }

  .tone-btn:hover { border-color: var(--gold); color: var(--text); }
  .tone-btn.active {
    background: var(--gold-dim);
    border-color: var(--gold);
    color: var(--gold);
  }

  /* Generate button */
  .gen-btn {
    width: 100%;
    background: var(--gold);
    color: #000;
    border: none;
    border-radius: 10px;
    padding: 16px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }

  .gen-btn:hover { background: var(--gold-light); transform: translateY(-1px); }
  .gen-btn:active { transform: translateY(0); }
  .gen-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Loading bar */
  .loading-bar {
    position: absolute;
    bottom: 0; left: 0;
    height: 3px;
    background: rgba(0,0,0,0.3);
    width: 0%;
    transition: width 0.3s;
    display: none;
  }

  .loading-bar.active { display: block; animation: load 2s ease-in-out infinite; }
  @keyframes load { 0%{width:0%} 50%{width:70%} 100%{width:100%} }

  /* Output */
  .output-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    display: none;
    animation: fadeUp 0.4s ease;
  }

  .output-card.visible { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .output-header {
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
    padding: 12px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .handle-tag {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 1px;
  }

  .char-count {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }

  .char-count.warn { color: #e8c96a; }
  .char-count.over { color: #e85c4a; }

  .post-body {
    padding: 18px;
    font-size: 14px;
    line-height: 1.75;
    white-space: pre-wrap;
    word-break: break-word;
    min-height: 140px;
    color: var(--text);
  }

  .post-body .bracket { color: #ffffff; font-weight: 600; }
  .post-body .hashtag { color: #4a9eff; }

  .output-actions {
    padding: 12px 18px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
  }

  .action-btn {
    flex: 1;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .action-btn:hover { border-color: var(--gold); color: var(--gold); }
  .action-btn.primary { background: var(--gold-dim); border-color: var(--gold); color: var(--gold); }

  /* Raw text area for copy */
  .raw-text {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    margin: 12px 18px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    line-height: 1.7;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
    display: none;
  }

  .raw-text.visible { display: block; }

  /* Thread preview */
  .thread-note {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 1px;
    padding: 0 18px 14px;
  }

  /* Error */
  .error-msg {
    background: rgba(232,92,74,0.1);
    border: 1px solid rgba(232,92,74,0.3);
    border-radius: 8px;
    padding: 12px;
    font-size: 12px;
    color: #e85c4a;
    font-family: 'DM Mono', monospace;
    display: none;
    margin-bottom: 12px;
  }

  .error-msg.visible { display: block; }

  /* Ticker strip */
  .ticker {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 1px;
    text-align: center;
    margin-bottom: 16px;
  }

  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(0,0,0,0.2);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
    display: none;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner.active { display: inline-block; }
</style>
</head>
<body>

<header>
  <div class="logo-line">@ISABELLEGASSEN</div>
  <h1>CRYPTO POST<br>GENERATOR</h1>
  <div class="subtitle">DAILY X INTEL DROP · AI POWERED</div>
</header>

<div class="ticker" id="dateTicker">⬡ LOADING DATE ⬡</div>

<!-- Topic selector -->
<div class="card">
  <div class="section-label">⬡ Pick Topics (choose 2–3)</div>
  <div class="topics-grid" id="topicGrid">
    <div class="topic-pill active" data-topic="BTC">BTC</div>
    <div class="topic-pill" data-topic="ETH">ETH</div>
    <div class="topic-pill active" data-topic="RWA">RWA</div>
    <div class="topic-pill" data-topic="DeFi">DeFi</div>
    <div class="topic-pill active" data-topic="Regulation">Regulation</div>
    <div class="topic-pill" data-topic="AI + Crypto">AI + Crypto</div>
    <div class="topic-pill" data-topic="Stablecoins">Stablecoins</div>
    <div class="topic-pill" data-topic="Layer 2">Layer 2</div>
    <div class="topic-pill" data-topic="Institutional">Institutional</div>
    <div class="topic-pill" data-topic="Privacy">Privacy</div>
    <div class="topic-pill" data-topic="NFTs">NFTs</div>
    <div class="topic-pill" data-topic="Memecoins">Memecoins</div>
  </div>
</div>

<!-- Tone selector -->
<div class="card">
  <div class="section-label">⬡ Tone</div>
  <div class="tone-row">
    <div class="tone-btn active" data-tone="intel">INTEL DROP</div>
    <div class="tone-btn" data-tone="alpha">ALPHA LEAK</div>
    <div class="tone-btn" data-tone="urgent">URGENT</div>
    <div class="tone-btn" data-tone="luxury">LUXURY</div>
  </div>
</div>

<!-- Error -->
<div class="error-msg" id="errorMsg"></div>

<!-- Generate -->
<button class="gen-btn" id="genBtn" onclick="generatePost()">
  <span class="spinner" id="spinner"></span>
  <span id="btnText">GENERATE TODAY'S POST</span>
  <div class="loading-bar" id="loadingBar"></div>
</button>

<!-- Output -->
<div class="output-card" id="outputCard">
  <div class="output-header">
    <span class="handle-tag">@IsabelleGassen · X.COM</span>
    <span class="char-count" id="charCount">0 / 280</span>
  </div>
  <div class="post-body" id="postBody"></div>
  <div class="thread-note" id="threadNote"></div>
  <div class="output-actions">
    <button class="action-btn" onclick="toggleRaw()">COPY TEXT</button>
    <button class="action-btn primary" onclick="generatePost()">REGENERATE</button>
  </div>
  <div class="raw-text" id="rawText"></div>
</div>

<script>
  // Date display
  const now = new Date();
  const opts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
  document.getElementById('dateTicker').textContent = '⬡ ' + now.toLocaleDateString('en-US', opts).toUpperCase() + ' ⬡';

  // Topic pills
  document.querySelectorAll('.topic-pill').forEach(pill => {
    pill.addEventListener('click', () => {
      const active = document.querySelectorAll('.topic-pill.active');
      if (pill.classList.contains('active')) {
        if (active.length > 1) pill.classList.remove('active');
      } else {
        if (active.length < 3) pill.classList.add('active');
      }
    });
  });

  // Tone buttons
  document.querySelectorAll('.tone-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tone-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  function getSelectedTopics() {
    return [...document.querySelectorAll('.topic-pill.active')].map(p => p.dataset.topic);
  }

  function getSelectedTone() {
    const active = document.querySelector('.tone-btn.active');
    return active ? active.dataset.tone : 'intel';
  }

  const toneDescriptions = {
    intel: 'structured intel briefing with [ HEADER ] labels per topic. Tone: cold, authoritative, elite insider.',
    alpha: 'alpha leak style — sounds like leaked insider info. Start with 🔓 or ⚡. Tone: secretive, urgent, exclusive.',
    urgent: 'urgent breaking news style. Use ⚠️ or 🚨. Tone: fast, punchy, breaking.',
    luxury: 'luxury crypto lifestyle angle. Tone: refined, aspirational, elite. Tie crypto to wealth, freedom, private life.'
  };

  let rawPostText = '';
  let showingRaw = false;

  async function generatePost() {
    const topics = getSelectedTopics();
    const tone = getSelectedTone();
    const today = now.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });

    const btn = document.getElementById('genBtn');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btnText');
    const loadingBar = document.getElementById('loadingBar');
    const errorMsg = document.getElementById('errorMsg');
    const outputCard = document.getElementById('outputCard');

    btn.disabled = true;
    spinner.classList.add('active');
    btnText.textContent = 'GENERATING...';
    loadingBar.classList.add('active');
    errorMsg.classList.remove('visible');
    showingRaw = false;
    document.getElementById('rawText').classList.remove('visible');

    const prompt = `You are a crypto intelligence content creator posting for @IsabelleGassen on X (Twitter).

Today's date: ${today}
Topics to cover: ${topics.join(', ')}
Post style: ${toneDescriptions[tone]}

Write a single X post (tweet) in the EXACT style of AIAgent0X:
- Use [ TOPIC HEADER ] labels in brackets for each topic point (ALL CAPS, 1-4 words)
- Each point is 1-2 punchy sentences MAX
- Use relevant #hashtags inline (2-3 hashtags total, mixed in naturally)
- End with 2-3 standalone hashtag lines
- Total length: 220-260 characters ideally, NEVER exceed 280 characters
- NO emojis unless tone is urgent or alpha
- Sound like elite crypto insider intel, not generic news
- Do NOT use quotation marks around the post
- Do NOT add any intro or explanation — output ONLY the post text

Output only the post text, nothing else.`;

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      const data = await response.json();

      if (data.error) throw new Error(data.error.message);

      const postText = data.content.map(b => b.text || '').join('').trim();
      rawPostText = postText;

      // Render with syntax highlighting
      const highlighted = postText
        .replace(/\[([^\]]+)\]/g, '<span class="bracket">[$1]</span>')
        .replace(/#(\w+)/g, '<span class="hashtag">#$1</span>');

      document.getElementById('postBody').innerHTML = highlighted;
      document.getElementById('rawText').textContent = postText;

      // Char count
      const len = postText.length;
      const charEl = document.getElementById('charCount');
      charEl.textContent = `${len} / 280`;
      charEl.className = 'char-count' + (len > 280 ? ' over' : len > 240 ? ' warn' : '');

      // Thread note
      const threadNote = document.getElementById('threadNote');
      if (len > 260) {
        threadNote.textContent = '⚠ Consider splitting into a thread — tap regenerate for a shorter version';
      } else {
        threadNote.textContent = '✓ Ready to post on X';
      }

      outputCard.classList.add('visible');
      outputCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    } catch (err) {
      errorMsg.textContent = '⚠ Error: ' + (err.message || 'Could not generate post. Try again.');
      errorMsg.classList.add('visible');
    }

    btn.disabled = false;
    spinner.classList.remove('active');
    btnText.textContent = 'GENERATE TODAY\'S POST';
    loadingBar.classList.remove('active');
  }

  function toggleRaw() {
    showingRaw = !showingRaw;
    const rawEl = document.getElementById('rawText');
    rawEl.classList.toggle('visible', showingRaw);
    if (showingRaw) {
      // Auto-select text for easy copy
      const range = document.createRange();
      range.selectNodeContents(rawEl);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    }
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Post Generator</title>
</head>
<body>
    <h1>Crypto Post Generator</h1>
    <button id="generate-button">Generate Post</button>
    <div id="output"></div>
    <script>
        document.getElementById('generate-button').addEventListener('click', async () => {
            const prompt = 'Generate a crypto post';
            const response = await fetch('/.netlify/functions/generatePost', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ prompt })
            });
            const data = await response.json();
            document.getElementById('output').innerText = data.post;
        });
    </script>
</body>
</html>
